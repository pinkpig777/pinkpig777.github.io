<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting...</title>
    <script>
      (function (location) {
        const pathSegmentsToKeep = 0;
        const basePath = location.pathname
          .split('/')
          .slice(0, 1 + pathSegmentsToKeep)
          .join('/');
        const routePath = location.pathname
          .slice(1)
          .split('/')
          .slice(pathSegmentsToKeep)
          .join('/')
          .replace(/&/g, '~and~');
        const query = location.search ? `&${location.search.slice(1).replace(/&/g, '~and~')}` : '';

        location.replace(`${location.protocol}//${location.hostname}${location.port ? `:${location.port}` : ''}${basePath}/?/${routePath}${query}${location.hash}`);
      })(window.location);
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
